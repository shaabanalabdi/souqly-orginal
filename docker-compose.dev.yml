services:
  backend:
    command: npm run dev
    environment:
      NODE_ENV: development
      FRONTEND_URLS: http://localhost:3000,http://localhost:5173,http://localhost
    volumes:
      - ./backend:/app
      - backend_dev_node_modules:/app/node_modules

  frontend:
    command: npm run dev -- --host 0.0.0.0 --port 3000
    environment:
      NODE_ENV: development
      VITE_DEV_BACKEND_URL: http://backend:5000
    volumes:
      - ./frontend:/app
      - frontend_dev_node_modules:/app/node_modules

volumes:
  backend_dev_node_modules:
  frontend_dev_node_modules:
