version: '3.8'

services:
  backend:
    command: npm run dev
    environment:
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    command: npm run dev -- --host 0.0.0.0 --port 3000
    environment:
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
